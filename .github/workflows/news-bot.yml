name: IODevz AI News Bot
on:
  schedule:
    # 6AM IST = 00:30 UTC, 12PM IST = 06:30 UTC, 6PM IST = 12:30 UTC
    - cron: '30 0,6,12 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no posting)'
        required: false
        default: 'false'

jobs:
  news-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright Chromium
        run: |
          cd scripts
          npm install
          npx playwright install --with-deps chromium

      - name: Build
        run: go build -o bot ./cmd/bot/

      - name: Run news bot
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_OAUTH_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: ./bot

      - name: Commit and push
        run: |
          git config user.name "iodevz-bot"
          git config user.email "contact.iodevz@gmail.com"
          git add state.json digests/ api/
          git diff --staged --quiet || git commit -m "bot: update $(date -u +%Y-%m-%dT%H%M)"
          git push
